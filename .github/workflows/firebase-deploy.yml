name: Firebase Deploy (main)

# Déploiement complet sur push vers main : Hosting + Firestore rules/indexes + Storage
# rules + Cloud Functions. Nécessite le secret FIREBASE_SERVICE_ACCOUNT.
on:
  push:
    branches: [main]
    # Ne PAS redéployer (donc ne pas rebâtir de conteneurs Cloud Build ni republier le hosting) pour un
    # merge qui ne touche QUE de la doc / des notes / la config d'agent : ces chemins n'affectent ni l'app
    # buildée (web/) ni les fonctions. Un merge mixte (doc + code) déclenche bien le déploiement. C'est
    # cette barrière qui évite qu'un simple merge de doc coûte un cycle de build complet.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".audit/**"
      - ".claude/**"

# Un SEUL déploiement Firebase à la fois. Deux merges rapprochés sur main lançaient deux `firebase deploy`
# CONCURRENTS sur le même projet → collision Cloud Run / Artifact Registry (HTTP 409 « service already
# exists », images d'artefacts mélangées entre les deux runs) et échec de déploiement de fonctions. On
# SÉRIALISE : les déploiements font la QUEUE (cancel-in-progress: false — on n'interrompt JAMAIS un déploiement
# prod en cours, ce qui laisserait un état partiel). Le run le plus récent attend la fin du précédent.
concurrency:
  group: firebase-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # HEAD^..HEAD pour le déploiement SÉLECTIF (functions/scripts/deploy-targets.mjs). Sans cette
          # profondeur, le git diff échoue → le script retombe (fail-safe) sur la liste complète.
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      # App Check : la clé reCAPTCHA v3 (secret APPCHECK_SITE_KEY) est injectée au build ; si le secret
      # est absent, l'app démarre sans App Check (non bloquant). Voir docs/app-check.md.
      # Config Firebase du client injectée au build depuis les VARIABLES de dépôt (Settings → Variables).
      # ABSENTES = chaîne vide → src/lib/firebase.ts retombe sur l'ANCIEN projet (repli `||`). Renseigner ces
      # variables (valeurs de l'app web neurones-360) est l'un des gestes de BASCULE (cf. docs/MIGRATION_PROJET.md) ;
      # tant qu'elles sont vides, le front reste sur propulse-business-87f7a.
      - name: Build web
        run: pnpm --filter web build
        env:
          VITE_APPCHECK_SITE_KEY: ${{ secrets.APPCHECK_SITE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}

      # Env runtime des Cloud Functions : l'enforcement App Check est piloté par la VARIABLE de dépôt
      # APPCHECK_ENFORCE (Settings → Variables). Ne PAS mettre à true tant que la clé reCAPTCHA n'est
      # pas déployée au client, sinon TOUS les callables seraient rejetés. IMPORTS_BUCKET rappelé ici
      # (défaut « nt360 » aussi codé en dur). BACKUP_BUCKET (variable de dépôt, optionnelle) isole les
      # sauvegardes Firestore ; vide = même bucket que les imports (repli du code sur IMPORTS_BUCKET).
      # Garde-fou App Check : enforce=true SANS clé de site déployée au client = tous les callables
      # rejetés → app inutilisable, alors que le déploiement resterait VERT. On échoue tôt, explicitement.
      # Garde-fou App Check : enforce=true SANS clé de site déployée au client = tous les callables
      # rejetés → app inutilisable, alors que le déploiement resterait VERT. On échoue tôt.
      # NB : le contexte `secrets` est INTERDIT dans un `if:` d'étape (erreur de compilation du workflow) →
      # on le lit via `env:` et on teste dans le `run:`. Le `if:` ne référence que `vars` (autorisé).
      - name: Garde-fou App Check (enforce ⇒ clé requise)
        if: ${{ vars.APPCHECK_ENFORCE == 'true' }}
        env:
          APPCHECK_SITE_KEY: ${{ secrets.APPCHECK_SITE_KEY }}
        run: |
          if [ -z "$APPCHECK_SITE_KEY" ]; then
            echo "::error::APPCHECK_ENFORCE=true mais APPCHECK_SITE_KEY absent — le client ne pourrait pas produire de jeton App Check et TOUS les callables seraient rejetés. Renseignez le secret APPCHECK_SITE_KEY ou repassez la variable APPCHECK_ENFORCE à false."
            exit 1
          fi
          echo "App Check : enforce=true + clé présente — OK"

      - name: Configurer l'env des functions
        env:
          RECOMPUTE_REGION: ${{ secrets.RECOMPUTE_REGION }}
        run: |
          printf 'IMPORTS_BUCKET=%s\nAPPCHECK_ENFORCE=%s\nBACKUP_BUCKET=%s\n' "${{ vars.IMPORTS_BUCKET || 'nt360' }}" "${{ vars.APPCHECK_ENFORCE }}" "${{ vars.BACKUP_BUCKET }}" > functions/.env
          # RECOMPUTE DIFFÉRÉ (perf des boutons d'action) : si le secret RECOMPUTE_REGION est fourni, on
          # l'écrit dans l'env runtime → les mutations répondent en ~ms (elles déposent une demande dans
          # config/recomputeRequest) au lieu d'attendre le recompute, ET index.js exporte alors le trigger
          # onRecomputeRequest (co-localisé à la base Firestore nommée) qui le traite hors du chemin de
          # réponse. Absent ⇒ repli synchrone (comportement historique). La valeur doit être une région de
          # fonction compatible avec la région de la base nt360 (cf. functions/.env.example).
          if [ -n "$RECOMPUTE_REGION" ]; then
            printf 'RECOMPUTE_REGION=%s\n' "$RECOMPUTE_REGION" >> functions/.env
            echo "Recompute différé : RECOMPUTE_REGION=$RECOMPUTE_REGION (trigger onRecomputeRequest inclus au déploiement)."
          else
            echo "Recompute différé NON activé (secret RECOMPUTE_REGION absent) — repli synchrone."
          fi

      - name: Write service account
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Le secret GRAPH_CLIENT_SECRET (Microsoft Graph / e-mails) est LIÉ (`secrets: [...]`) à des fonctions.
      # S'il n'existe pas encore dans Secret Manager, `firebase deploy` le RÉCLAME (prompt interactif) et
      # échoue en CI — ce qui bloquait TOUT le déploiement (hosting + functions non livrés). On garantit ici
      # son existence de façon NON BLOQUANTE : si absent, on crée une version PLACEHOLDER inerte. Le secret
      # RESTE dans Secret Manager (politique « secrets uniquement dans Secret Manager » respectée), l'e-mail
      # RESTE inactif (config/emailNotify non renseignée ⇒ canSend=false, donc aucun envoi). Pour ACTIVER
      # l'e-mail plus tard : `firebase functions:secrets:set GRAPH_CLIENT_SECRET` (pose la vraie valeur, qui
      # devient une nouvelle version ENABLED et prime). Idempotent : si une version active existe déjà
      # (placeholder ou vraie valeur), on n'y touche pas — le vrai secret n'est jamais écrasé.
      - name: Assurer l'existence de GRAPH_CLIENT_SECRET (déploiement non bloquant)
        run: |
          gcloud auth activate-service-account --key-file="$HOME/sa.json"
          PROJECT="${{ vars.FIREBASE_PROJECT_ID || 'propulse-business-87f7a' }}"
          if ! gcloud secrets describe GRAPH_CLIENT_SECRET --project="$PROJECT" >/dev/null 2>&1; then
            echo "GRAPH_CLIENT_SECRET absent → création d'une version placeholder inerte (e-mails désactivés)."
            printf 'UNSET' | gcloud secrets create GRAPH_CLIENT_SECRET --data-file=- --replication-policy=automatic --project="$PROJECT"
          elif ! gcloud secrets versions list GRAPH_CLIENT_SECRET --project="$PROJECT" --filter='state:ENABLED' --format='value(name)' | grep -q .; then
            echo "GRAPH_CLIENT_SECRET sans version active → ajout d'un placeholder inerte."
            printf 'UNSET' | gcloud secrets versions add GRAPH_CLIENT_SECRET --data-file=- --project="$PROJECT"
          else
            echo "GRAPH_CLIENT_SECRET déjà provisionné — inchangé (le vrai secret n'est jamais écrasé)."
          fi

      # Bundle des codebases AVANT le déploiement (ADR-SPLIT-02). Chaque codebase dépend de
      # @nt360/functions-shared en workspace:* — protocole que le `npm install` de Cloud Build
      # (npm, pas pnpm) ne sait PAS résoudre → EUNSUPPORTEDPROTOCOL, tout le déploiement échouait
      # (run #597). On compile chaque codebase (esbuild) dans `<codebase>/.deploy` avec le socle
      # inliné et un package.json self-contained ; firebase.json pointe `source` sur ces .deploy/.
      # Un hook `predeploy` referait ce build, mais on le fait ICI explicitement pour que les .deploy/
      # existent AVANT que firebase lise la config, et pour recopier functions/.env (écrit plus haut)
      # dans functions/.deploy/ (Firebase lit le .env DANS le dossier source du codebase).
      - name: Bundle des codebases (esbuild → .deploy self-contained)
        run: |
          for cb in functions functions-par functions-rh functions-commerce functions-ops; do
            node scripts/bundle-codebase.mjs "$cb"
          done

      # Projet PARTAGÉ : déploiement scopé (site hosting dédié, base Firestore nommée
      # nt360, nos functions par nom). Ne touche ni à la base (default) ni aux functions
      # de l'autre app.
      # Retry : `firebase deploy` renvoie parfois une erreur transitoire à l'upload des fonctions.
      - name: Deploy (hosting dédié + firestore:rules nt360 + nos functions)
        env:
          RECOMPUTE_REGION: ${{ secrets.RECOMPUTE_REGION }}
        run: |
          # NB : « storage » est VOLONTAIREMENT hors des cibles --only. Le déploiement des Storage
          # rules interroge le bucket Storage par défaut du projet (firebasestorage.defaultBucket.get) ;
          # le compte de service n'a pas ce droit (ou le bucket n'existe pas) → HTTP 403 qui faisait
          # ÉCHOUER TOUT le déploiement (donc hosting + functions non livrés). Le Storage n'est pas
          # gaté par des rules côté app (accès serveur via Admin SDK). Réintégrer « storage » ci-dessous
          # uniquement après avoir créé le bucket + accordé le droit au SA.
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"
          # Cibles functions construites depuis la SOURCE UNIQUE functions/deployed-functions.txt
          # (une fonction/ligne ; lignes # et vides ignorées). Le même fichier est vérifié en CI contre
          # les exports de index.js (functions/scripts/check-deploy-targets.mjs) → plus de dérive possible :
          # une nouvelle fonction non listée fait échouer le check AVANT le merge, pas silencieusement en prod.
          # Déploiement SÉLECTIF (barrière coûts) : deploy-targets.mjs dérive les cibles `functions:` du
          # git diff HEAD^..HEAD. Si le merge ne touche RIEN sous functions/, la liste est VIDE → aucune
          # fonction redéployée (0 conteneur Cloud Build). Au moindre doute (base absente, clone superficiel,
          # diff en échec), le script retombe sur la liste COMPLÈTE (fail-safe : jamais moins sûr qu'avant).
          FN_TARGETS=$(node functions/scripts/deploy-targets.mjs)
          echo "Cibles fonctions retenues : ${FN_TARGETS:-<aucune — hosting/firestore seulement>}"
          # Trigger du recompute DIFFÉRÉ : env-gated (exporté uniquement si RECOMPUTE_REGION est défini) donc
          # VOLONTAIREMENT ABSENT de deployed-functions.txt (le garde-fou CI n'attrape que les exports de
          # premier niveau). Quand la région est fournie, on l'ajoute aux cibles pour qu'il soit déployé EN
          # MÊME TEMPS que l'env runtime qui l'active — sinon les mutations déposeraient des demandes de
          # recompute que personne ne traiterait (summaries périmés jusqu'au recompute nocturne). Fail = le
          # déploiement échoue et l'ANCIENNE version (recompute synchrone) reste en ligne → toujours correct.
          # onMntApprovalDecided (application des décisions d'approbation de contrat, ADR-022) est le MÊME cas :
          # env-gated sur RECOMPUTE_REGION (co-localisé à la base nommée), absent de deployed-functions.txt,
          # ajouté ici quand la région est fournie pour être déployé avec son env runtime.
          # Fonctions env-gated : seulement si des fonctions sont DÉJÀ dans le lot (sinon rien à co-déployer).
          if [ -n "$FN_TARGETS" ] && [ -n "$RECOMPUTE_REGION" ]; then FN_TARGETS="${FN_TARGETS},functions:onRecomputeRequest,functions:onMntApprovalDecided"; fi
          # Cible --only : hosting/firestore TOUJOURS (bon marché, idempotent) ; functions seulement si non vide
          # (pas de virgule finale ni de token `functions` nu — ce dernier déclencherait un déploiement complet).
          ONLY="hosting,firestore:rules,firestore:indexes"
          if [ -n "$FN_TARGETS" ]; then ONLY="${ONLY},${FN_TARGETS}"; fi
          attempt=1; max=4
          while true; do
            if npx firebase deploy \
              --only "$ONLY" \
              --project "${{ vars.FIREBASE_PROJECT_ID || 'propulse-business-87f7a' }}" --non-interactive; then
              echo "Déploiement OK (tentative $attempt)"; break
            fi
            if [ "$attempt" -ge "$max" ]; then echo "::error::firebase deploy a échoué après $max tentatives"; exit 1; fi
            wait=$((attempt * 30)); echo "::warning::Déploiement échoué (tentative $attempt/$max) — retry dans ${wait}s"
            sleep "$wait"; attempt=$((attempt + 1))
          done
