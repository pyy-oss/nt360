name: Firebase Deploy (main)

# Déploiement complet sur push vers main : Hosting + Firestore rules/indexes + Storage
# rules + Cloud Functions. Nécessite le secret FIREBASE_SERVICE_ACCOUNT.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      # App Check : la clé reCAPTCHA v3 (secret APPCHECK_SITE_KEY) est injectée au build ; si le secret
      # est absent, l'app démarre sans App Check (non bloquant). Voir docs/app-check.md.
      - name: Build web
        run: pnpm --filter web build
        env:
          VITE_APPCHECK_SITE_KEY: ${{ secrets.APPCHECK_SITE_KEY }}

      # Env runtime des Cloud Functions : l'enforcement App Check est piloté par la VARIABLE de dépôt
      # APPCHECK_ENFORCE (Settings → Variables). Ne PAS mettre à true tant que la clé reCAPTCHA n'est
      # pas déployée au client, sinon TOUS les callables seraient rejetés. IMPORTS_BUCKET rappelé ici
      # (défaut « nt360 » aussi codé en dur).
      - name: Configurer l'env des functions
        run: |
          printf 'IMPORTS_BUCKET=nt360\nAPPCHECK_ENFORCE=%s\n' "${{ vars.APPCHECK_ENFORCE }}" > functions/.env

      - name: Write service account
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Projet PARTAGÉ : déploiement scopé (site hosting dédié, base Firestore nommée
      # nt360, nos functions par nom). Ne touche ni à la base (default) ni aux functions
      # de l'autre app.
      # Retry : `firebase deploy` renvoie parfois une erreur transitoire à l'upload des fonctions.
      - name: Deploy (hosting dédié + firestore:rules nt360 + nos functions)
        run: |
          # NB : « storage » est VOLONTAIREMENT hors des cibles --only. Le déploiement des Storage
          # rules interroge le bucket Storage par défaut du projet (firebasestorage.defaultBucket.get) ;
          # le compte de service n'a pas ce droit (ou le bucket n'existe pas) → HTTP 403 qui faisait
          # ÉCHOUER TOUT le déploiement (donc hosting + functions non livrés). Le Storage n'est pas
          # gaté par des rules côté app (accès serveur via Admin SDK). Réintégrer « storage » ci-dessous
          # uniquement après avoir créé le bucket + accordé le droit au SA.
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"
          attempt=1; max=4
          while true; do
            if npx firebase deploy \
              --only "hosting,firestore:rules,functions:setUserRole,functions:logLogin,functions:recompute,functions:exportReport,functions:importLegacyBackup,functions:importDelta,functions:addBcLine,functions:parseBcPdf,functions:setBcStatus,functions:upsertCreditLine,functions:dedupe,functions:syncSalesData,functions:scheduledFirestoreExport,functions:upsertOpportunity,functions:deleteOpportunity,functions:setInvoiceFp,functions:patchOrder,functions:patchBcLine,functions:scheduledRecompute,functions:setAlertThresholds,functions:setNotificationConfig,functions:alertDigest,functions:setProjectionConfig,functions:setBillingMilestones,functions:logClientError,functions:setPermissions,functions:createUser,functions:attachUser,functions:setUserActive,functions:createOrder,functions:patchOpportunity,functions:patchInvoice,functions:patchProjectSheet,functions:setClientAliases,functions:deleteRecords,functions:setCancellation,functions:reingest,functions:setOrderPm,functions:setFxRates,functions:setRefList,functions:setClickupConfig,functions:pushOrderToClickup,functions:listClickupMembers,functions:syncClickupCaf,functions:syncFromClickup,functions:scheduledClickupPull,functions:pushAllOrdersToClickup,functions:reconcileClickupLinks,functions:clickupHealth,functions:pushBcToClickup,functions:pushAllBcToClickup,functions:reconcileBcLinks,functions:syncBcFromClickup,functions:scheduledBcPull,functions:clickupWebhook,functions:setupClickupWebhook,functions:deleteClickupWebhook" \
              --project propulse-business-87f7a --non-interactive; then
              echo "Déploiement OK (tentative $attempt)"; break
            fi
            if [ "$attempt" -ge "$max" ]; then echo "::error::firebase deploy a échoué après $max tentatives"; exit 1; fi
            wait=$((attempt * 30)); echo "::warning::Déploiement échoué (tentative $attempt/$max) — retry dans ${wait}s"
            sleep "$wait"; attempt=$((attempt + 1))
          done
