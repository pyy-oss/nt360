name: Firebase Hosting Preview

# Déploie un canal de preview Firebase Hosting sur chaque PR et poste l'URL en commentaire.
# Nécessite le secret FIREBASE_SERVICE_ACCOUNT (compte de service du projet).
# Tant que le secret est absent, les étapes de build/deploy sont ignorées (job vert).
on:
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    # Ignore les PR issues de forks (pas d'accès aux secrets).
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check service account secret
        id: guard
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then echo "ok=true" >> "$GITHUB_OUTPUT";
          else echo "ok=false" >> "$GITHUB_OUTPUT"; echo "::notice::FIREBASE_SERVICE_ACCOUNT absent — preview ignorée."; fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.ok == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.ok == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.ok == 'true'
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        if: steps.guard.outputs.ok == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build web
        if: steps.guard.outputs.ok == 'true'
        run: pnpm --filter web build
        env:
          # Le canal de preview appelle les MÊMES Cloud Functions que la prod : une fois l'enforcement
          # App Check actif, la preview a aussi besoin de la clé reCAPTCHA pour émettre un jeton valide.
          VITE_APPCHECK_SITE_KEY: ${{ secrets.APPCHECK_SITE_KEY }}

      # Firebase Hosting plafonne le nombre de canaux de preview par site. Chaque PR en crée un
      # (rétention plusieurs jours) ; sans purge on finit par saturer le quota (429 RESOURCE_EXHAUSTED)
      # et le déploiement échoue. On purge donc les plus anciens AVANT de déployer (on garde les 3
      # plus récents). Étape 100 % tolérante : elle ne doit jamais casser la CI.
      - name: Prune old preview channels (stay under quota)
        if: steps.guard.outputs.ok == 'true'
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set +e
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"
          npx -y firebase-tools hosting:channel:list --site nt360 --project propulse-business-87f7a --json > channels.json 2>/dev/null
          KEEP=3
          ids=$(node -e '
            try {
              const d = JSON.parse(require("fs").readFileSync("channels.json","utf8"));
              const ch = ((d.result && d.result.channels) || d.channels || [])
                .filter((c) => !/\/channels\/live$/.test(c.name || ""));
              ch.sort((a,b) => String(b.updateTime||"").localeCompare(String(a.updateTime||"")));
              console.log(ch.slice('"$KEEP"').map((c) => (c.name||"").split("/").pop()).filter(Boolean).join("\n"));
            } catch (e) { /* silencieux : pas de purge si le format change */ }
          ')
          for id in $ids; do
            echo "Purge canal preview obsolète : $id"
            npx -y firebase-tools hosting:channel:delete "$id" --site nt360 --project propulse-business-87f7a --force 2>/dev/null
          done
          exit 0

      # best-effort : si le quota est encore atteint malgré la purge, on N'ÉCHOUE PAS la PR
      # (la preview est un confort, pas une barrière). build-test reste le gate opposable.
      - name: Deploy preview channel
        if: steps.guard.outputs.ok == 'true'
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: propulse-business-87f7a
          expires: 2d
