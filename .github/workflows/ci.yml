name: CI

# push sur main (validation post-merge) + toute PR (validation pré-merge). On NE relance PLUS le CI
# sur chaque push de branche : une branche à PR ouverte recevait DEUX runs par commit (event `push` +
# event `pull_request`) — coût de runner doublé. La PR couvre les branches ; `push:[main]` couvre main.
on:
  push:
    branches: [main]
  pull_request:

# Un seul run CI par branche à la fois : un nouveau commit ANNULE le run en cours devenu obsolète
# (cancel-in-progress) au lieu d'empiler des runs parallèles (install + couverture + émulateur règles +
# build + Playwright ≈ plusieurs minutes de runner chacun). C'est le pendant CI de la sérialisation des
# déploiements — ce qui rend un empilement structurellement impossible.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # La version de pnpm est déterminée par le champ `packageManager` du package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Tests parseurs & domaine + couverture ≥80% (Vitest)
        run: pnpm --filter @nt360/functions-shared test:coverage

      - name: Tests front (Vitest)
        run: pnpm --filter web test

      # Lint ciblé : règles des hooks React (rules-of-hooks en ERREUR). Bloque les hooks
      # conditionnels / après retour anticipé (classe du crash React #310) AVANT le build.
      - name: Lint (règles des hooks React)
        run: pnpm --filter web lint

      - name: Tests de règles Firestore (rules-unit-testing via émulateur)
        run: pnpm test:rules

      - name: Cohérence du déploiement (exports index.js ⇔ deployed-functions.txt)
        run: node functions/scripts/check-deploy-targets.mjs

      # Garde « bundle déployable » (ADR-SPLIT-02) : compile les 5 codebases (esbuild) et vérifie
      # que chaque .deploy/ est self-contained (aucun workspace:*, que npm côté Cloud Build ne sait
      # pas résoudre → cause de l'échec du deploy #597) et expose exactement les fonctions du manifeste.
      - name: Garde bundle déployable (esbuild, self-contained)
        run: node functions/scripts/check-bundle-codebases.mjs

      # Garde anti-ReferenceError (no-undef sur le code SERVEUR) : attrape un identifiant utilisé sans
      # require/définition dans sa portée AVANT le déploiement (classe du bug « buildFpAliasResolver is
      # not defined » qui ne se voyait qu'en prod, faute d'étape de compilation côté functions).
      - name: Garde no-undef (functions)
        run: node functions/scripts/check-no-undef.mjs

      - name: Validité des index Firestore (pas d'index mono-champ → déploiement)
        run: node functions/scripts/check-firestore-indexes.mjs

      - name: Build web
        run: pnpm --filter web build

      - name: Budget de bundle (chunk d'entrée)
        run: pnpm --filter web check:bundle

      # Smoke E2E de PR : joue le rendu de l'écran de connexion contre l'app BUILDÉE (vite preview,
      # servie localement par Playwright). Sans secret — les tests de marge se skippent. Attrape les
      # régressions runtime (écran blanc, crash au boot, assets manquants) avant merge.
      # NB : `--with-deps` lançait `apt-get` (install des libs système) qui échouait quand le dépôt
      # apt Microsoft (packages.microsoft.com) était temporairement « no longer signed » — panne
      # UPSTREAM qui bloquait tout le job. Les runners ubuntu-latest embarquent déjà les libs système
      # requises par Chromium ; on installe donc UNIQUEMENT le binaire du navigateur (pas d'apt).
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install chromium

      - name: Smoke E2E (app buildée, sans secret)
        run: pnpm --filter web test:e2e

      - name: Upload rapport Playwright (si échec)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ci
          path: web/playwright-report/
          retention-days: 7
