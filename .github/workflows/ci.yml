name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # La version de pnpm est déterminée par le champ `packageManager` du package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Install functions deps
        run: pnpm --filter functions install

      - name: Tests parseurs & domaine + couverture ≥80% (Vitest)
        run: pnpm --filter functions test:coverage

      - name: Tests front (Vitest)
        run: pnpm --filter web test

      # Lint ciblé : règles des hooks React (rules-of-hooks en ERREUR). Bloque les hooks
      # conditionnels / après retour anticipé (classe du crash React #310) AVANT le build.
      - name: Lint (règles des hooks React)
        run: pnpm --filter web lint

      - name: Tests de règles Firestore (rules-unit-testing via émulateur)
        run: pnpm test:rules

      - name: Cohérence du déploiement (exports index.js ⇔ deployed-functions.txt)
        run: node functions/scripts/check-deploy-targets.mjs

      - name: Validité des index Firestore (pas d'index mono-champ → déploiement)
        run: node functions/scripts/check-firestore-indexes.mjs

      - name: Build web
        run: pnpm --filter web build

      - name: Budget de bundle (chunk d'entrée)
        run: pnpm --filter web check:bundle

      # Smoke E2E de PR : joue le rendu de l'écran de connexion contre l'app BUILDÉE (vite preview,
      # servie localement par Playwright). Sans secret — les tests de marge se skippent. Attrape les
      # régressions runtime (écran blanc, crash au boot, assets manquants) avant merge.
      # NB : `--with-deps` lançait `apt-get` (install des libs système) qui échouait quand le dépôt
      # apt Microsoft (packages.microsoft.com) était temporairement « no longer signed » — panne
      # UPSTREAM qui bloquait tout le job. Les runners ubuntu-latest embarquent déjà les libs système
      # requises par Chromium ; on installe donc UNIQUEMENT le binaire du navigateur (pas d'apt).
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install chromium

      - name: Smoke E2E (app buildée, sans secret)
        run: pnpm --filter web test:e2e

      - name: Upload rapport Playwright (si échec)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ci
          path: web/playwright-report/
          retention-days: 7
